<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Ace Facility — Sign in</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg2); }
    .login-card {
      background:var(--surface);
      border:0.5px solid var(--border);
      border-radius:16px;
      padding:40px 36px;
      width:100%;
      max-width:380px;
      box-shadow:0 4px 32px rgba(0,0,0,0.07);
    }
    .login-logo { display:flex; align-items:center; gap:10px; margin-bottom:28px; }
    .login-logo-icon {
      width:40px; height:40px; background:#0f2744; border-radius:10px;
      display:flex; align-items:center; justify-content:center;
    }
    .login-logo-icon svg { width:22px; height:22px; }
    .login-logo-name { font-family:'Playfair Display',serif; font-size:20px; color:var(--text); }
    .login-logo-sub  { font-size:12px; color:var(--text2); display:block; margin-top:-2px; }
    h2 { font-size:18px; font-weight:500; color:var(--text); margin-bottom:6px; }
    p  { font-size:14px; color:var(--text2); margin-bottom:24px; }
    label { font-size:13px; color:var(--text2); display:block; margin-bottom:5px; }
    input[type=email] {
      width:100%; padding:10px 14px; border-radius:8px; border:0.5px solid var(--border);
      background:var(--bg2); font-size:14px; font-family:inherit; color:var(--text);
      outline:none; margin-bottom:14px;
    }
    input[type=email]:focus { border-color:#378add; }
    .btn-login {
      width:100%; padding:11px; border-radius:8px; border:none;
      background:#0f2744; color:#fff; font-size:14px; font-weight:500;
      font-family:inherit; cursor:pointer; transition:background 0.15s;
    }
    .btn-login:hover { background:#1a3a5c; }
    .btn-login:disabled { opacity:0.6; cursor:not-allowed; }
    .msg { margin-top:16px; font-size:13px; text-align:center; color:var(--text2); min-height:20px; }
    .msg.success { color:#1a6b3c; }
    .msg.error   { color:#b03a2e; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="9"/>
        <path d="M5.5 5.5 Q12 10 18.5 5.5"/>
        <path d="M5.5 18.5 Q12 14 18.5 18.5"/>
      </svg>
    </div>
    <div>
      <span class="login-logo-name">Ace Facility</span>
      <span class="login-logo-sub">Management Portal</span>
    </div>
  </div>

  <h2>Sign in</h2>
  <p>Enter your email and we'll send you a magic link — no password needed.</p>

  <label for="email">Email address</label>
  <input type="email" id="email" placeholder="you@yourclub.com" autocomplete="email"/>
  <button class="btn-login" id="btn" onclick="sendMagicLink()">Send magic link</button>
  <div class="msg" id="msg"></div>
</div>

<script>
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // If already signed in, go straight to dashboard
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) location.href = 'index.html';
  });

  async function sendMagicLink() {
    const email = document.getElementById('email').value.trim();
    const msg   = document.getElementById('msg');
    const btn   = document.getElementById('btn');
    if (!email) { showMsg('Please enter your email address.', 'error'); return; }
    btn.disabled = true;
    btn.textContent = 'Sending…';
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: location.origin + '/index.html' }
    });
    if (error) {
      showMsg(error.message, 'error');
      btn.disabled = false;
      btn.textContent = 'Send magic link';
    } else {
      showMsg('Magic link sent! Check your inbox.', 'success');
      btn.textContent = 'Link sent';
    }
  }

  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMagicLink();
  });

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + (type || '');
  }
</script>
</body>
</html>
